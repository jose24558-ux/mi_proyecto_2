<body>

    <div class="header">
        <h1>Mis Productos</h1>
        <p class="subtitle">Inventario conectado a MariaDB</p>
    </div>

    <button class="btn-cargar" onclick="cargarProductos()">
        <span>🔄</span> Actualizar Inventario
    </button>

    <div id="contenedor-productos">
        </div>

    <script>
        async function cargarProductos() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">Cargando productos...</div>';

            try {
                const respuesta = await fetch('http://localhost:3000');
                const resultado = await respuesta.json();

                if (resultado.status === "OK") {
                    contenedor.innerHTML = ""; // Limpiar

                    resultado.datos.forEach(p => {
                        contenedor.innerHTML += `
                            <div class="producto-card">
                                <div class="producto-id">REF: #${p.id}</div>
                                <h2 class="producto-nombre">${p.nombre}</h2>
                                <div class="producto-precio-label">Precio Actual</div>
                                <div class="producto-precio">$${p.precio.toLocaleString()}</div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                contenedor.innerHTML = `
                    <div class="error-msg">
                        <strong>⚠️ No se pudo conectar con la API</strong><br>
                        Verifica que tu servidor Node.js esté corriendo.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
